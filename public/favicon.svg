<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Squircle Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff5f6" />
      <stop offset="100%" stop-color="#ffe3e8" />
    </linearGradient>

    <!-- Brand Rose/Crimson Gradient for Shield -->
    <linearGradient id="shield-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" />
      <stop offset="50%" stop-color="#be123c" />
      <stop offset="100%" stop-color="#9f1239" />
    </linearGradient>

    <!-- Golden Highlight Gradient for Safe Path -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Soft Drop Shadow for Depth -->
    <filter id="drop-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#be123c" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Clean rounded icon container (Squircle style) -->
  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg-grad)" stroke="#ffe4e6" stroke-width="8" />

  <!-- The Protective Shield & Route Path Combination Group -->
  <g filter="url(#drop-shadow)">
    <!-- Base Outer Shield Path -->
    <path d="M256,96 C195,96 138,124 138,124 C138,260 190,370 256,416 C322,370 374,260 374,124 C374,124 317,96 256,96 Z" 
          fill="url(#shield-grad)" />

    <!-- Inner Shield Accent for 3D/Chiseled Professional Look -->
    <path d="M256,120 C207,120 162,143 162,143 C162,250 204,340 256,380 C308,340 350,250 350,143 C350,143 305,120 256,120 Z" 
          fill="#ffffff" opacity="0.15" />

    <!-- Stylized Safe Route Path weaving through the Shield -->
    <!-- Starting outside bottom-left, curving safely inside, ending in a destination point -->
    <path d="M190,330 C220,290 220,230 256,230 C290,230 300,190 320,165" 
          fill="none" 
          stroke="url(#gold-grad)" 
          stroke-width="24" 
          stroke-linecap="round" />

    <!-- Pulsing active GPS Location Dot inside the Shield -->
    <circle cx="320" cy="165" r="22" fill="#ffffff" />
    <circle cx="320" cy="165" r="14" fill="url(#gold-grad)" />
  </g>
</svg>